# ZephyrStream Docker Compose
#
# Default: hanya ZephyrStream (hemat RAM)
#   docker compose up -d
#
# Dengan monitoring stack (butuh ~1GB RAM tambahan):
#   docker compose --profile monitoring up -d
#
# Stop semua:
#   docker compose --profile monitoring down

services:
  # === ZephyrStream Main App ===
  zephystream:
    build: .
    container_name: zephystream
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3003:3003"
    volumes:
      - zephyr-db:/app/db
      - zephyr-uploads:/app/public/uploads
      - zephyr-logs:/app/logs
      - zephyr-backups:/app/backups
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - FFMPEG_PATH=ffmpeg
      - FFPROBE_PATH=ffprobe
      - SPEEDTEST_BIN=/usr/local/bin/speedtest
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/system/time"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # === MONITORING STACK (optional — use --profile monitoring) ===

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    depends_on:
      - zephystream
    deploy:
      resources:
        limits:
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  zephyr-db:
  zephyr-uploads:
  zephyr-logs:
  zephyr-backups:
  uptime-kuma-data:
  prometheus-data:
  grafana-data:
