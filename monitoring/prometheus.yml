# Prometheus configuration for ZephyrStream monitoring
# Scrapes metrics from ZephyrStream's /api/system/stats endpoint via
# a prometheus-format exporter (or node_exporter if installed separately).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # === ZephyrStream App Metrics ===
  # NOTE: ZephyrStream doesn't have a native Prometheus exporter endpoint.
  # To enable metrics scraping, either:
  #   1. Install node_exporter on the VPS for system-level metrics
  #   2. Add a /metrics endpoint to ZephyrStream that exposes app-level metrics
  #   3. Use Uptime Kuma's Prometheus-compatible push endpoint
  #
  # For now, this config scrapes node_exporter if it's running on the host.
  - job_name: "zephystream"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: "zephystream"
    scrape_interval: 30s

  # === Prometheus Self-Monitoring ===
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # === Uptime Kuma ===
  - job_name: "uptime-kuma"
    static_configs:
      - targets: ["uptime-kuma:3001"]
    scrape_interval: 30s
